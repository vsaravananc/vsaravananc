name: Generate Trophy

on:
  schedule:
    - cron: "0 0 * * *"   # regenerate once a day
  workflow_dispatch:        # allows manual trigger from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate trophy image
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: vsaravananc
          output_path: trophy.svg
          theme: tokyonight
          no-frame: "true"
          row: "1"
          column: "6"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit trophy.svg
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trophy.svg
          git commit -m "Update trophy image" || exit 0
          git push